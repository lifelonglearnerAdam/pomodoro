<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>番茄钟</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    font-family: 'Segoe UI', system-ui, sans-serif;
  }

  .container {
    text-align: center;
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(10px);
    border-radius: 32px;
    padding: 60px 50px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
  }

  .mode-indicator {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 30px;
    padding: 8px 24px;
    border-radius: 20px;
    display: inline-block;
    transition: all 0.3s ease;
  }

  .mode-indicator.focus {
    color: #ff6b6b;
    background: rgba(255, 107, 107, 0.15);
  }

  .mode-indicator.break {
    color: #51cf66;
    background: rgba(81, 207, 102, 0.15);
  }

  .timer-ring {
    position: relative;
    width: 280px;
    height: 280px;
    margin: 0 auto 40px;
  }

  .timer-ring svg {
    transform: rotate(-90deg);
  }

  .ring-bg {
    stroke: rgba(255, 255, 255, 0.08);
    fill: none;
    stroke-width: 8;
  }

  .ring-progress {
    fill: none;
    stroke-width: 8;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s linear, stroke 0.3s ease;
  }

  .ring-progress.focus { stroke: #ff6b6b; }
  .ring-progress.break { stroke: #51cf66; }

  .time-display {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 62px;
    font-weight: 200;
    color: #fff;
    font-variant-numeric: tabular-nums;
    letter-spacing: 2px;
  }

  .buttons {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
  }

  button {
    padding: 14px 36px;
    font-size: 16px;
    font-weight: 600;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.25s ease;
    letter-spacing: 1px;
    outline: none;
  }

  button:active { transform: scale(0.95); }

  .btn-start {
    background: linear-gradient(135deg, #ff6b6b, #ee5a24);
    color: #fff;
    box-shadow: 0 6px 24px rgba(238, 90, 36, 0.4);
  }

  .btn-start:hover { box-shadow: 0 8px 32px rgba(238, 90, 36, 0.6); transform: translateY(-2px); }

  .btn-pause {
    background: linear-gradient(135deg, #feca57, #ff9f43);
    color: #1a1a2e;
    box-shadow: 0 6px 24px rgba(254, 202, 87, 0.4);
  }

  .btn-pause:hover { box-shadow: 0 8px 32px rgba(254, 202, 87, 0.6); transform: translateY(-2px); }

  .btn-reset {
    background: rgba(255, 255, 255, 0.08);
    color: rgba(255, 255, 255, 0.85);
    border: 1px solid rgba(255, 255, 255, 0.15);
  }

  .btn-reset:hover { background: rgba(255, 255, 255, 0.15); transform: translateY(-2px); }

  .presets {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 28px;
  }

  .btn-preset {
    padding: 8px 18px;
    font-size: 14px;
    font-weight: 500;
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 10px;
    cursor: pointer;
    background: rgba(255, 255, 255, 0.05);
    color: rgba(255, 255, 255, 0.7);
    transition: all 0.25s ease;
    letter-spacing: 1px;
    outline: none;
  }

  .btn-preset:hover {
    background: rgba(255, 255, 255, 0.12);
    color: rgba(255, 255, 255, 0.95);
  }

  .btn-preset.active {
    background: rgba(255, 107, 107, 0.2);
    border-color: rgba(255, 107, 107, 0.5);
    color: #ff6b6b;
  }

  .session-count {
    margin-top: 28px;
    color: rgba(255, 255, 255, 0.5);
    font-size: 14px;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
<div class="container">
  <div class="mode-indicator focus" id="modeIndicator">专注</div>

  <div class="timer-ring">
    <svg width="280" height="280" viewBox="0 0 280 280">
      <circle class="ring-bg" cx="140" cy="140" r="124" />
      <circle class="ring-progress focus" id="progressRing" cx="140" cy="140" r="124"
              stroke-dasharray="779.115" stroke-dashoffset="0" />
    </svg>
    <div class="time-display" id="timeDisplay">25:00</div>
  </div>

  <div class="presets" id="presets">
    <button class="btn-preset" onclick="setFocusTime(15)">15 分钟</button>
    <button class="btn-preset active" onclick="setFocusTime(25)">25 分钟</button>
    <button class="btn-preset" onclick="setFocusTime(45)">45 分钟</button>
    <button class="btn-preset" onclick="setFocusTime(60)">60 分钟</button>
  </div>

  <div class="buttons">
    <button class="btn-start" id="btnStart" onclick="startTimer()">开始</button>
    <button class="btn-pause" id="btnPause" onclick="pauseTimer()">暂停</button>
    <button class="btn-reset" id="btnReset" onclick="resetTimer()">重置</button>
  </div>

  <div class="session-count" id="sessionCount">已完成 0 个番茄</div>
</div>

<script>
  const CIRCUMFERENCE = 2 * Math.PI * 124; // 779.115

  const BREAK_TIME = 5 * 60;

  let focusTime = 25 * 60;

  let mode = 'focus';
  let remaining = focusTime;
  let totalTime = focusTime;
  let timerId = null;
  let running = false;
  let sessions = 0;

  const modeIndicator = document.getElementById('modeIndicator');
  const timeDisplay = document.getElementById('timeDisplay');
  const progressRing = document.getElementById('progressRing');
  const btnStart = document.getElementById('btnStart');
  const sessionCount = document.getElementById('sessionCount');

  function formatTime(seconds) {
    const m = Math.floor(seconds / 60);
    const s = seconds % 60;
    return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
  }

  function updateDisplay() {
    timeDisplay.textContent = formatTime(remaining);
    const progress = remaining / totalTime;
    progressRing.setAttribute('stroke-dashoffset', CIRCUMFERENCE * (1 - progress));
  }

  function tick() {
    if (remaining <= 0) {
      clearInterval(timerId);
      timerId = null;
      running = false;
      btnStart.textContent = '开始';

      if (mode === 'focus') {
        sessions++;
        sessionCount.textContent = '已完成 ' + sessions + ' 个番茄';
      }

      switchMode();
      startTimer();
      return;
    }

    remaining--;
    updateDisplay();
  }

  function switchMode() {
    if (mode === 'focus') {
      mode = 'break';
      remaining = BREAK_TIME;
      totalTime = BREAK_TIME;
      modeIndicator.textContent = '休息';
      modeIndicator.className = 'mode-indicator break';
      progressRing.className = 'ring-progress break';
    } else {
      mode = 'focus';
      remaining = focusTime;
      totalTime = focusTime;
      modeIndicator.textContent = '专注';
      modeIndicator.className = 'mode-indicator focus';
      progressRing.className = 'ring-progress focus';
    }
    updateDisplay();
  }

  function startTimer() {
    if (running) return;

    running = true;
    btnStart.textContent = '开始';
    timerId = setInterval(tick, 1000);
  }

  function pauseTimer() {
    if (!running) return;

    running = false;
    btnStart.textContent = '继续';
    clearInterval(timerId);
    timerId = null;
  }

  function setFocusTime(minutes) {
    focusTime = minutes * 60;
    remaining = focusTime;
    totalTime = focusTime;
    clearInterval(timerId);
    timerId = null;
    running = false;
    mode = 'focus';
    btnStart.textContent = '开始';
    modeIndicator.textContent = '专注';
    modeIndicator.className = 'mode-indicator focus';
    progressRing.className = 'ring-progress focus';

    const buttons = document.querySelectorAll('.btn-preset');
    buttons.forEach(function(btn) {
      btn.classList.remove('active');
      if (btn.textContent.startsWith(minutes + ' ')) {
        btn.classList.add('active');
      }
    });

    updateDisplay();
  }

  function resetTimer() {
    clearInterval(timerId);
    timerId = null;
    running = false;
    mode = 'focus';
    remaining = focusTime;
    totalTime = focusTime;
    btnStart.textContent = '开始';
    modeIndicator.textContent = '专注';
    modeIndicator.className = 'mode-indicator focus';
    progressRing.className = 'ring-progress focus';
    updateDisplay();
  }
</script>
</body>
</html>
